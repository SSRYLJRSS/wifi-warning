name: Release portable package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME}"
          cat > release-notes.md <<EOF
          ## WiFi Warning ${VERSION} / WiFi 警告 ${VERSION}

          - Fixes multiple rules sharing the same shortcut: only the last rule took effect before.
          - Fixes multi-network blocking failure when a shortcut is managed by several rules simultaneously.
          - 修复多条规则绑定同一快捷方式时仅最后一条生效的问题。
          - 修复同一快捷方式被多条规则管理时，多网络匹配拦截失效的 bug。
          EOF

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/WiFiWarning-portable.zip --clobber
          else
            gh release create "$TAG_NAME" release/WiFiWarning-portable.zip \
              --title "WiFi Warning ${TAG_NAME}" \
              --notes-file release-notes.md
          fi
